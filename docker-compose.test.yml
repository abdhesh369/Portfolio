# ============================================
# Docker Compose — Isolated Test Environment
# Used by CI pipelines and local test runs
# Usage: docker compose -f docker-compose.test.yml up --abort-on-container-exit
# ============================================
version: '3.8'

services:
  test-postgres:
    image: postgres:16-alpine
    container_name: portfolio-test-db
    environment:
      POSTGRES_DB: portfolio_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data  # RAM-backed for speed
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d portfolio_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  test-redis:
    image: redis:7-alpine
    container_name: portfolio-test-redis
    ports:
      - "6380:6379"
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  test-backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: portfolio-test-api
    environment:
      NODE_ENV: test
      PORT: 5000
      DATABASE_URL: postgresql://test_user:test_password@test-postgres:5432/portfolio_test
      REDIS_URL: redis://test-redis:6379
      JWT_SECRET: test_jwt_secret_key_that_is_at_least_64_characters_long_for_ci_!!!
      JWT_REFRESH_SECRET: test_jwt_refresh_secret_key_at_least_64_characters_long_for_ci__!!
      ADMIN_PASSWORD: test-admin-password
      ADMIN_EMAIL: admin@test.com
      CONTACT_EMAIL: contact@test.com
      LOG_LEVEL: warn
    depends_on:
      test-postgres:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  test-network:
    driver: bridge
