version: 2
updates:
  # Backend dependencies
  - package-ecosystem: "npm"
    directory: "/Backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      server-dependencies:
        patterns:
          - "express*"
          - "@types/express*"
          - "nodemon*"
      backend-types:
        patterns:
          - "@types/*"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps):"

  # Frontend dependencies
  - package-ecosystem: "npm"
    directory: "/Frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      frontend-framework:
        patterns:
          - "vite*"
          - "@vitejs/*"
          - "tailwind*"
      frontend-types:
        patterns:
          - "@types/*"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps):"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"