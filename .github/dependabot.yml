version: 2
updates:
  # ── Backend dependencies ───────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/Backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      server-core:
        patterns:
          - "express*"
          - "@types/express*"
          - "nodemon*"
          - "cors*"
          - "helmet*"
          - "compression*"
      database:
        patterns:
          - "drizzle*"
          - "postgres*"
          - "pg*"
          - "@neondatabase/*"
      auth:
        patterns:
          - "jsonwebtoken*"
          - "@types/jsonwebtoken*"
          - "bcrypt*"
          - "@types/bcrypt*"
          - "passport*"
      observability:
        patterns:
          - "@sentry/*"
          - "winston*"
          - "pino*"
      backend-types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/express*"
          - "@types/jsonwebtoken*"
          - "@types/bcrypt*"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps):"

  # ── Frontend dependencies ──────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/Frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      react-core:
        patterns:
          - "react"
          - "react-dom"
          - "react-router*"
          - "@types/react"
          - "@types/react-dom"
      build-tools:
        patterns:
          - "vite*"
          - "@vitejs/*"
          - "rollup*"
          - "esbuild*"
      styling:
        patterns:
          - "tailwind*"
          - "@tailwindcss/*"
          - "postcss*"
          - "autoprefixer*"
      testing:
        patterns:
          - "vitest*"
          - "playwright*"
          - "@playwright/*"
          - "@testing-library/*"
          - "msw*"
      observability:
        patterns:
          - "@sentry/*"
      frontend-types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/react"
          - "@types/react-dom"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps):"

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci):"
