name: CI

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch/PR on new pushes.
# Workflow name prefix prevents a second workflow from sharing the same group.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege defaults; pr-summary job extends this with pull-requests: write.
permissions:
  contents: read

env:
  NODE_VERSION: "22"
  VITE_DIST_ASSETS: "Frontend/dist/assets"

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — Static checks (type-check, lint, migration integrity)
# Fastest gate. All other jobs wait on this one.
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  static-checks:
    name: "Static Checks"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Backend — type check
        run: npm run type-check -w Backend

      - name: Frontend — type check
        run: npm run type-check -w Frontend

      - name: Backend — lint (zero warnings)
        run: npm run lint -w Backend

      - name: Frontend — lint (zero warnings)
        run: npm run lint -w Frontend

      # ── Migration duplicate number check ────────────────────────────────────
      # Detects duplicate migration numbers (e.g. a 0017 collision) before they
      # can reach any database. The validate-migrations.js script only counts
      # files; this step catches the more dangerous duplicate-prefix case.
      - name: Check for duplicate migration numbers
        run: |
          node --input-type=module << 'EOF'
          import { readdirSync } from "fs";

          const dir = "Backend/drizzle/migrations";
          const files = readdirSync(dir)
            .filter(f => f.endsWith(".sql"))
            .map(f => ({ file: f, prefix: f.split("_")[0] }));

          const seen = new Map();
          const duplicates = [];

          for (const { file, prefix } of files) {
            if (seen.has(prefix)) {
              duplicates.push(`  ${seen.get(prefix)}  <->  ${file}`);
            } else {
              seen.set(prefix, file);
            }
          }

          if (duplicates.length > 0) {
            console.error("FAIL: Duplicate migration numbers detected:");
            duplicates.forEach(d => console.error(d));
            console.error("Resolve the collision before merging.");
            process.exit(1);
          }

          console.log(`OK: ${files.length} migrations, no duplicate numbers.`);
          EOF

      - name: Run migration validator
        run: node Backend/scripts/validate-migrations.js

# ══════════════════════════════════════════════════════════════════════════════
# JOB 2 — Unit tests + coverage
# No real database needed — DB calls are mocked.
# ══════════════════════════════════════════════════════════════════════════════
  unit-tests:
    name: "Unit Tests + Coverage"
    runs-on: ubuntu-latest
    needs: static-checks
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Backend — unit tests with coverage
        run: npm run test:coverage -w Backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/portfolio_test
          JWT_SECRET: test_secret_key_at_least_64_characters_long_for_proper_security_in_ci_runs
          JWT_REFRESH_SECRET: test_refresh_secret_key_at_least_64_chars_long_for_security_in_ci_runs_
          ADMIN_PASSWORD: ci_test_admin_password_secure
          ADMIN_EMAIL: admin@ci-test.local
          CONTACT_EMAIL: contact@ci-test.local

      - name: Frontend — unit tests with coverage
        run: npm run test:coverage -w Frontend
        env:
          VITE_API_URL: http://localhost:5000
          VITE_CLOUDINARY_CLOUD_NAME: ci_placeholder
          VITE_SENTRY_DSN: ""
          VITE_SENTRY_ENVIRONMENT: test

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: Backend/coverage/
          retention-days: 7

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: Frontend/coverage/
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# JOB 3 — Integration tests
# Spins up a real Postgres 16 service container so migrations and queries run
# against an actual database instead of mocks.
# GitHub Actions waits for healthy services automatically when --health-cmd is
# configured, so no manual polling step is needed.
# ══════════════════════════════════════════════════════════════════════════════
  integration-tests:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: static-checks
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: portfolio_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d portfolio_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Enable Memory Overcommit
        run: sudo sysctl -w vm.overcommit_memory=1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            nc -z localhost 6379 && echo Redis up && exit 0
            sleep 1
          done
          echo Redis did not start in time
          exit 1

      - name: Run database migrations
        run: npm run migrate -w Backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/portfolio_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Backend — integration tests
        run: npm run test:integration -w Backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/portfolio_test
          JWT_SECRET: test_secret_key_at_least_64_characters_long_for_proper_security_in_ci_runs
          JWT_REFRESH_SECRET: test_refresh_secret_key_at_least_64_chars_long_for_security_in_ci_runs_
          ADMIN_PASSWORD: ci_test_admin_password_secure
          ADMIN_EMAIL: admin@ci-test.local
          CONTACT_EMAIL: contact@ci-test.local

# ══════════════════════════════════════════════════════════════════════════════
# JOB 4 — Frontend build + bundle size guard
# Enforces a hard 1000 KB per-chunk limit. The dist path is driven by the
# VITE_DIST_ASSETS env var so a vite.config.ts output change can't silently
# break this check — update the env var at the top of this file instead.
# ══════════════════════════════════════════════════════════════════════════════
  build-check:
    name: "Frontend Build + Bundle Size"
    runs-on: ubuntu-latest
    needs: static-checks
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Build frontend
        run: npm run build -w Frontend
        env:
          VITE_API_URL: https://placeholder.api
          VITE_CLOUDINARY_CLOUD_NAME: ci_placeholder
          VITE_SENTRY_DSN: ""
          VITE_SENTRY_ENVIRONMENT: ci

      - name: Check chunk sizes (max 1000 KB per chunk)
        env:
          DIST_ASSETS: ${{ env.VITE_DIST_ASSETS }}
        run: |
          node --input-type=module << 'EOF'
          import { readdirSync, statSync } from "fs";
          import path from "path";

          const distDir = process.env.DIST_ASSETS;
          const MAX_KB = 1000;
          const MAX_BYTES = MAX_KB * 1024;

          let failed = false;
          const files = readdirSync(distDir).filter(f => f.endsWith(".js"));

          for (const file of files) {
            const { size } = statSync(path.join(distDir, file));
            const kb = (size / 1024).toFixed(1);
            const status = size > MAX_BYTES ? "FAIL" : "OK";
            console.log(`${status}  ${kb} KB  ${file}`);
            if (size > MAX_BYTES) failed = true;
          }

          if (failed) {
            console.error(`\nOne or more chunks exceed ${MAX_KB} KB. Split the chunk or audit what caused the regression.`);
            process.exit(1);
          }
          EOF

      # stats.html is only emitted when rollup-plugin-visualizer is configured
      # in vite.config.ts. This step is skipped silently when it doesn't exist.
      - name: Check for bundle stats file
        id: stats-check
        run: |
          if [ -f "Frontend/stats.html" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        if: always() && steps.stats-check.outputs.exists == 'true'
        with:
          name: bundle-stats
          path: Frontend/stats.html
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# JOB 5 — E2E tests (non-blocking)
# Playwright browsers are cached by package-lock.json hash to avoid paying
# the ~2-3 min install cost on every run.
#
# The backend is started before Playwright runs so API calls don't get
# ECONNREFUSED. Replace `npm run start -w Backend` with your actual script.
#
# Health probe uses a TCP port check (nc) as a fallback — this works even if
# the backend has no /health HTTP endpoint.
#
# Flip continue-on-error to false once the suite has a proven green track record.
# ══════════════════════════════════════════════════════════════════════════════
  e2e-tests:
    name: "E2E Tests (blocking)"
    runs-on: ubuntu-latest
    needs: [unit-tests, build-check]
    continue-on-error: false
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: portfolio_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d portfolio_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Enable Memory Overcommit
        run: sudo sysctl -w vm.overcommit_memory=1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            nc -z localhost 6379 && echo Redis up && exit 0
            sleep 1
          done
          echo Redis did not start in time
          exit 1

      - name: Run database migrations
        run: npm run migrate -w Backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/portfolio_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-chromium-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: Frontend

      - name: Install Playwright system deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: Frontend

      - name: Build frontend for preview
        run: npm run build -w Frontend
        env:
          VITE_API_URL: http://127.0.0.1:5005
          VITE_CLOUDINARY_CLOUD_NAME: ci_placeholder
          VITE_SENTRY_DSN: ""
          VITE_GA_MEASUREMENT_ID: G-MOCK-ID
          VITE_DISABLE_PWA: "true"
          VITE_SENTRY_ENVIRONMENT: test

      - name: Start backend server
        run: npm run test:e2e:server -w Backend > /tmp/backend.log 2>&1 &
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/portfolio_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test_secret_key_at_least_64_characters_long_for_proper_security_in_ci_runs
          JWT_REFRESH_SECRET: test_refresh_secret_key_at_least_64_chars_long_for_security_in_ci_runs_
          ADMIN_PASSWORD: ci_test_admin_password_unbreakable_long_string_12345
          ADMIN_EMAIL: admin@ci-test.local
          CONTACT_EMAIL: contact@ci-test.local
        shell: bash

      - name: Wait for backend to be ready
        run: |
          for i in {1..90}; do
            if curl -s http://127.0.0.1:5005/ping | grep -q 'ok'; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Waiting for backend... ($i/90)"
            sleep 3
          done
          echo "--- BACKEND LOG ---"
          cat /tmp/backend.log
          echo "Backend failed to become ready in time"
          exit 1

      - name: Run E2E tests
        run: npx playwright test
        working-directory: Frontend
        env:
          CI: true
          NODE_ENV: test
          TEST_ADMIN_PASSWORD: ci_test_admin_password_unbreakable_long_string_12345
          PORT: 5005
          HOST: 127.0.0.1
          DATABASE_URL: postgresql://postgres:password@localhost:5432/portfolio_test
          JWT_SECRET: test_secret_key_at_least_64_characters_long_for_proper_security_in_ci_runs
          JWT_REFRESH_SECRET: test_refresh_secret_key_at_least_64_chars_long_for_security_in_ci_runs_
          ADMIN_PASSWORD: ci_test_admin_password_unbreakable_long_string_12345
          ADMIN_EMAIL: admin@ci-test.local
          CONTACT_EMAIL: contact@ci-test.local
          VITE_DISABLE_PWA: "true"
          GITHUB_USERNAME: abdhesh369

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: Frontend/playwright-report/
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# JOB 6 — Store CI results for the PR comment job
# The pr-summary workflow (ci-pr-comment.yml) runs with write permissions on
# workflow_run and reads these results to post the comment. This pattern is
# required because pull_request events from forks run with read-only tokens —
# posting comments directly from this workflow would silently fail for fork PRs.
# ══════════════════════════════════════════════════════════════════════════════
  save-results:
    name: "Save CI Results"
    runs-on: ubuntu-latest
    needs: [static-checks, unit-tests, integration-tests, build-check, e2e-tests]
    if: always() && github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: Write results to file
        run: |
          cat << 'JSON' > results.json
          {
            "pr_number": ${{ github.event.pull_request.number }},
            "static_checks": "${{ needs.static-checks.result }}",
            "unit_tests": "${{ needs.unit-tests.result }}",
            "integration_tests": "${{ needs.integration-tests.result }}",
            "build_check": "${{ needs.build-check.result }}",
            "e2e_tests": "${{ needs.e2e-tests.result }}"
          }
          JSON
          cat results.json

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-results
          path: results.json
          retention-days: 1
