name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: Backend
      - name: Type check
        run: npx tsc --noEmit
        working-directory: Backend
      - name: Lint
        run: npm run lint
        working-directory: Backend
        continue-on-error: true # Allow lint errors to pass for now if any exist
      - name: Run Tests
        run: npm run test
        working-directory: Backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/postgres
          JWT_SECRET: test_secret_key_at_least_64_characters_long_for_proper_security_padding__

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: Frontend
      - name: Type check
        run: npx tsc --noEmit
        working-directory: Frontend
      - name: Lint
        run: npm run lint
        working-directory: Frontend
        continue-on-error: true
      - name: Run Tests
        run: npm run test
        working-directory: Frontend

  schema-sync:
    name: Schema Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify shared schemas are identical
        run: diff Backend/shared/schema.ts Frontend/shared/schema.ts
