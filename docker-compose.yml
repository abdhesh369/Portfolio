# Docker Compose for Portfolio Monorepo

services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-portfolio}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - portfolio-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: portfolio-api
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-5000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-portfolio}
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Sentry configuration (optional, will use env vars if provided)
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    environment:
      # These are build-time args for Vite, but Vite can also use runtime env
      # if configured, though standard Vite build embeds them.
      VITE_API_URL: ${FRONTEND_VITE_API_URL:-http://localhost:5000}
      VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
      VITE_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - portfolio-network

volumes:
  postgres_data:
  redis_data:


networks:
  portfolio-network:
    driver: bridge
